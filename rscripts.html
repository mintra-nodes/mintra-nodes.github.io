<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>rScripts</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08080b;
      --surface: #0e0e13;
      --surface2: #121218;
      --surface3: #18181f;
      --surface4: #1e1e27;
      --border: #1f1f2e;
      --border2: #2a2a3a;
      --accent: #6c5fff;
      --accent2: #9d8fff;
      --accent-glow: rgba(108, 95, 255, 0.15);
      --text: #dcdce8;
      --text-muted: #6868888;
      --text-dim: #3a3a52;
      --green: #3ddc84;
      --red: #f06a6a;
      --yellow: #f5a623;
      --blue: #5294e2;
      --radius: 12px;
      --radius-sm: 7px;
      --t: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Top Bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 50;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    #searchInput {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px 9px 34px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: var(--t);
      -webkit-appearance: none;
    }

    #searchInput::placeholder { color: var(--text-dim); }
    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .filter-btn {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--t);
      flex-shrink: 0;
      position: relative;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent2);
      background: var(--accent-glow);
    }

    .filter-dot {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      display: none;
    }

    .filter-dot.visible { display: block; }

    /* ── Filter Panel ── */
    .filter-panel {
      position: absolute;
      top: calc(100% + 6px);
      right: 14px;
      width: 280px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      z-index: 200;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transform-origin: top right;
      transform: scale(0.94) translateY(-6px);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .filter-panel.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    .filter-panel-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .filter-panel-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .filter-clear {
      font-size: 11px;
      color: var(--accent2);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    .filter-clear:hover { text-decoration: underline; }

    .filter-section { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .filter-section:last-child { border-bottom: none; }

    .filter-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .filter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
    }

    .filter-row-label {
      font-size: 13px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .filter-row-label svg { color: var(--text-dim); }

    /* Toggle */
    .toggle {
      width: 34px;
      height: 19px;
      border-radius: 999px;
      background: var(--surface4);
      border: 1px solid var(--border2);
      position: relative;
      cursor: pointer;
      transition: var(--t);
      flex-shrink: 0;
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: var(--t);
    }

    .toggle.on { background: var(--accent); border-color: var(--accent); }
    .toggle.on::after { transform: translateX(15px); background: #fff; }

    /* Sort select inside panel */
    .filter-select-wrap {
      position: relative;
      width: 100%;
    }

    .filter-select {
      width: 100%;
      appearance: none;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 7px 28px 7px 10px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      transition: var(--t);
    }

    .filter-select:focus { border-color: var(--accent); }

    .filter-select-arrow {
      position: absolute;
      right: 9px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text-dim);
      display: flex;
    }

    /* ── Scroll Area ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .scroll-area::-webkit-scrollbar { width: 0; }

    /* ── Grid ── */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      gap: 0;
      cursor: pointer;
      transition: var(--t);
      animation: fadeUp 0.25s ease both;
    }

    .card:hover {
      border-color: var(--border2);
      background: var(--surface2);
    }

    .card:active { transform: scale(0.99); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-thumb {
      width: 100px;
      flex-shrink: 0;
      background: var(--surface3);
      overflow: hidden;
      position: relative;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--text-dim);
    }

    .card-content {
      flex: 1;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 5px;
    }

    .badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 999px;
      text-transform: uppercase;
    }

    .badge-free     { background: rgba(61,220,132,0.12); color: var(--green);  border: 1px solid rgba(61,220,132,0.22); }
    .badge-paid     { background: rgba(245,166,35,0.12);  color: var(--yellow); border: 1px solid rgba(245,166,35,0.22); }
    .badge-key      { background: rgba(240,106,106,0.12); color: var(--red);   border: 1px solid rgba(240,106,106,0.22); }
    .badge-verified { background: rgba(108,95,255,0.12);  color: var(--accent2);border: 1px solid rgba(108,95,255,0.22); }

    .card-stats {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: auto;
    }

    .stat {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .stat-up   { color: var(--green); }
    .stat-down { color: var(--red); }

    /* ── Skeleton ── */
    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      height: 80px;
      overflow: hidden;
    }

    .skel {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      height: 100%;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 14px 12px;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .page-btn {
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--t);
      -webkit-tap-highlight-color: transparent;
    }

    .page-btn:hover:not(:disabled) { border-color: var(--border2); color: var(--text); }
    .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-ellipsis { color: var(--text-dim); font-size: 12px; padding: 0 2px; }

    /* ── State boxes ── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 60px 20px;
      text-align: center;
    }

    .state-icon { font-size: 36px; }
    .state-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .state-sub { font-size: 13px; color: var(--text-dim); max-width: 280px; line-height: 1.5; }
    .retry-btn {
      margin-top: 4px;
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
    }

    /* ── Modal / Sheet ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .sheet {
      width: 100%;
      background: var(--surface);
      border-radius: 18px 18px 0 0;
      border-top: 1px solid var(--border2);
      max-height: 88vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
      -webkit-overflow-scrolling: touch;
    }

    .modal-overlay.open .sheet {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--border2);
      margin: 12px auto 0;
    }

    .sheet-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sheet-game {
      font-size: 11px;
      color: var(--accent2);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .sheet-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
    }

    .sheet-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }

    .sheet-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      background: var(--surface3);
    }

    .sheet-thumb-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--surface3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: var(--text-dim);
    }

    .sheet-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; }

    .sheet-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .sheet-desc {
      font-size: 13px;
      color: #686888;
      line-height: 1.6;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .meta-cell {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 11px;
    }

    .meta-cell-label { font-size: 10px; color: var(--text-dim); margin-bottom: 3px; }
    .meta-cell-value { font-size: 13px; font-weight: 500; color: var(--text); }

    .author-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }

    .author-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--surface3);
      flex-shrink: 0;
    }

    .author-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .author-sub  { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* ── Action Buttons ── */
    .sheet-actions {
      display: flex;
      gap: 8px;
      padding: 0 16px 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }

    .btn-execute {
      flex: 1;
      padding: 12px;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: var(--t);
      -webkit-tap-highlight-color: transparent;
    }

    .btn-execute:hover { opacity: 0.88; }
    .btn-execute:active { transform: scale(0.97); }
    .btn-execute:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-copy {
      width: 46px;
      height: 46px;
      border-radius: var(--radius-sm);
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--t);
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-copy:hover { border-color: var(--accent); color: var(--accent2); }
    .btn-copy:active { transform: scale(0.95); }
    .btn-copy.copied { border-color: var(--green); color: var(--green); }

    /* Loading spinner inside button */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="search-wrap">
    <span class="search-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </span>
    <input id="searchInput" type="search" placeholder="Search scripts…" autocomplete="off" autocorrect="off" spellcheck="false" />
  </div>

  <button class="filter-btn" id="filterToggle" aria-label="Filters">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
    </svg>
    <span class="filter-dot" id="filterDot"></span>
  </button>

  <!-- Filter Panel -->
  <div class="filter-panel" id="filterPanel">
    <div class="filter-panel-header">
      <span class="filter-panel-title">Filters</span>
      <button class="filter-clear" id="filterClear">Clear all</button>
    </div>

    <div class="filter-section">
      <div class="filter-section-label">Script Type</div>
      <div class="filter-row">
        <span class="filter-row-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
          Free Only
        </span>
        <div class="toggle" id="t-notPaid" data-key="notPaid"></div>
      </div>
      <div class="filter-row">
        <span class="filter-row-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
          No Key System
        </span>
        <div class="toggle" id="t-noKeySystem" data-key="noKeySystem"></div>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-section-label">Creator</div>
      <div class="filter-row">
        <span class="filter-row-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 12l2 2 4-4m6 2a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
          Verified Only
        </span>
        <div class="toggle" id="t-verifiedOnly" data-key="verifiedOnly"></div>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-section-label">Sort By</div>
      <div class="filter-select-wrap" style="margin-bottom:8px">
        <select class="filter-select" id="orderBy">
          <option value="date">Date</option>
          <option value="views">Views</option>
          <option value="likes">Likes</option>
          <option value="dislikes">Dislikes</option>
        </select>
        <span class="filter-select-arrow">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </span>
      </div>
      <div class="filter-select-wrap">
        <select class="filter-select" id="sortDir">
          <option value="desc">Newest First</option>
          <option value="asc">Oldest First</option>
        </select>
        <span class="filter-select-arrow">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </span>
      </div>
    </div>
  </div>
</div>

<!-- Scroll Area -->
<div class="scroll-area" id="scrollArea">
  <div class="grid" id="grid"></div>
</div>

<!-- Pagination -->
<div class="pagination" id="pagination"></div>

<!-- Script Sheet Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheetThumbWrap"></div>
    <div class="sheet-header">
      <div class="sheet-game" id="sheetGame"></div>
      <div class="sheet-title" id="sheetTitle"></div>
      <div class="sheet-badges" id="sheetBadges"></div>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
    <div class="sheet-actions">
      <button class="btn-execute" id="btnExecute">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span id="btnExecuteLabel">Execute</span>
        <div class="spinner" id="btnSpinner"></div>
      </button>
      <button class="btn-copy" id="btnCopy" aria-label="Copy script">
        <svg id="copyIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  /* ════════════════════════════════════════
     Bridge — C# calls these from WebView
     ════════════════════════════════════════ */

  // Called by C# to signal execute completed
  function onExecuteComplete(success, message) {
    const btn    = document.getElementById('btnExecute');
    const label  = document.getElementById('btnExecuteLabel');
    const spinner= document.getElementById('btnSpinner');
    spinner.style.display = 'none';
    btn.disabled = false;
    label.textContent = success ? 'Executed!' : 'Failed';
    setTimeout(() => { label.textContent = 'Execute'; }, 2000);
  }

  // Called by C# to signal copy completed
  function onCopyComplete() {
    const btn = document.getElementById('btnCopy');
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg id="copyIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    }, 2000);
  }

  /* ════════════════════════════════════════
     Internal bridge dispatch
     ════════════════════════════════════════ */

  let _currentRawUrl = null;

  function _triggerExecute(rawUrl) {
    // Attempt CefSharp / WebView2 / WKWebView bridges
    if (window.CefSharp) {
      CefSharp.PostMessage(JSON.stringify({ type: 'execute', url: rawUrl }));
      return;
    }
    if (window.chrome && window.chrome.webview) {
      chrome.webview.postMessage(JSON.stringify({ type: 'execute', url: rawUrl }));
      return;
    }
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.execute) {
      webkit.messageHandlers.execute.postMessage({ url: rawUrl });
      return;
    }
    // Fallback: no host app — simulate
    console.log('[rScripts] Execute:', rawUrl);
    setTimeout(() => onExecuteComplete(true, 'ok'), 800);
  }

  function _triggerCopy(rawUrl) {
    if (window.CefSharp) {
      CefSharp.PostMessage(JSON.stringify({ type: 'copy', url: rawUrl }));
      return;
    }
    if (window.chrome && window.chrome.webview) {
      chrome.webview.postMessage(JSON.stringify({ type: 'copy', url: rawUrl }));
      return;
    }
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.copy) {
      webkit.messageHandlers.copy.postMessage({ url: rawUrl });
      return;
    }
    // Fallback: clipboard API
    if (navigator.clipboard) {
      fetch(rawUrl).then(r => r.text()).then(t => {
        navigator.clipboard.writeText(t).then(() => onCopyComplete());
      }).catch(() => onCopyComplete());
    } else {
      console.log('[rScripts] Copy:', rawUrl);
      onCopyComplete();
    }
  }

  /* ════════════════════════════════════════
     State
     ════════════════════════════════════════ */
  const state = {
    page: 1,
    maxPages: 1,
    q: '',
    filters: { noKeySystem: false, notPaid: false, verifiedOnly: false },
    orderBy: 'date',
    sort: 'desc',
    loading: false,
    debounce: null,
  };

  /* ════════════════════════════════════════
     Fetch
     ════════════════════════════════════════ */
  async function fetchScripts() {
    if (state.loading) return;
    state.loading = true;
    renderSkeletons();

    const p = new URLSearchParams({ page: state.page, orderBy: state.orderBy, sort: state.sort });
    if (state.q)                    p.set('q', state.q);
    if (state.filters.noKeySystem)  p.set('noKeySystem', 'true');
    if (state.filters.notPaid)      p.set('notPaid', 'true');
    if (state.filters.verifiedOnly) p.set('verifiedOnly', 'true');

    try {
      const res = await fetch(`https://rscripts.net/api/v2/scripts?${p}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (!data || typeof data !== 'object') throw new Error('Bad response');

      const info    = data.info    || {};
      const scripts = Array.isArray(data.scripts) ? data.scripts : [];
      state.maxPages = Math.max(1, parseInt(info.maxPages) || 1);

      renderGrid(scripts);
      renderPagination();
    } catch (e) {
      renderError(e.message);
    } finally {
      state.loading = false;
    }
  }

  /* ════════════════════════════════════════
     Render
     ════════════════════════════════════════ */
  function renderSkeletons() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let i = 0; i < 10; i++) {
      const el = document.createElement('div');
      el.className = 'skeleton-card';
      el.innerHTML = '<div class="skel"></div>';
      grid.appendChild(el);
    }
    document.getElementById('pagination').innerHTML = '';
  }

  function renderGrid(scripts) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    if (!scripts.length) {
      grid.innerHTML = `
        <div class="state-box">
          <div class="state-icon">🔍</div>
          <div class="state-title">No scripts found</div>
          <div class="state-sub">Try a different search or adjust your filters.</div>
        </div>`;
      return;
    }

    scripts.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 20}ms`;

      const imgSrc    = safeUrl(s.image);
      const gameTitle = s.game?.title    || '';
      const username  = s.user?.username || 'Unknown';
      const updated   = s.lastUpdated ? timeAgo(new Date(s.lastUpdated))
                      : s.createdAt   ? timeAgo(new Date(s.createdAt)) : '';

      const thumbHtml = imgSrc
        ? `<img src="${x(imgSrc)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=thumb-placeholder>🎮</div>'">`
        : `<div class="thumb-placeholder">🎮</div>`;

      card.innerHTML = `
        <div class="card-thumb">${thumbHtml}</div>
        <div class="card-content">
          <div class="card-title">${x(s.title || 'Untitled')}</div>
          <div class="card-meta">
            ${s.paid === false ? '<span class="badge badge-free">Free</span>' : '<span class="badge badge-paid">Paid</span>'}
            ${s.keySystem ? '<span class="badge badge-key">Key</span>' : ''}
            ${s.user?.verified ? '<span class="badge badge-verified">✓</span>' : ''}
          </div>
          <div class="card-stats">
            <span class="stat stat-up">▲ ${fmt(s.likes)}</span>
            <span class="stat stat-down">▼ ${fmt(s.dislikes)}</span>
            <span class="stat">👁 ${fmt(s.views)}</span>
            ${updated ? `<span class="stat">${x(updated)}</span>` : ''}
          </div>
        </div>`;

      card.addEventListener('click', () => openSheet(s));
      grid.appendChild(card);
    });
  }

  function renderError(msg) {
    document.getElementById('grid').innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        <div class="state-title">Failed to load</div>
        <div class="state-sub">${x(msg)}</div>
        <button class="retry-btn" onclick="fetchScripts()">Retry</button>
      </div>`;
    document.getElementById('pagination').innerHTML = '';
  }

  function renderPagination() {
    const el = document.getElementById('pagination');
    el.innerHTML = '';
    if (state.maxPages <= 1) return;

    el.appendChild(pBtn('←', state.page <= 1, () => goTo(state.page - 1)));

    buildRange(state.page, state.maxPages).forEach(p => {
      if (p === '…') {
        const s = document.createElement('span');
        s.className = 'page-ellipsis';
        s.textContent = '…';
        el.appendChild(s);
      } else {
        const b = pBtn(p, false, () => goTo(p));
        if (p === state.page) b.classList.add('active');
        el.appendChild(b);
      }
    });

    el.appendChild(pBtn('→', state.page >= state.maxPages, () => goTo(state.page + 1)));
  }

  function pBtn(label, disabled, fn) {
    const b = document.createElement('button');
    b.className = 'page-btn';
    b.textContent = label;
    b.disabled = disabled;
    if (!disabled) b.addEventListener('click', fn);
    return b;
  }

  function goTo(page) {
    state.page = page;
    document.getElementById('scrollArea').scrollTop = 0;
    fetchScripts();
  }

  function buildRange(cur, max) {
    if (max <= 7) return Array.from({ length: max }, (_, i) => i + 1);
    const set = new Set([1, max, cur, cur - 1, cur + 1].filter(n => n >= 1 && n <= max));
    const sorted = [...set].sort((a, b) => a - b);
    const out = [];
    let prev = null;
    for (const n of sorted) {
      if (prev !== null && n - prev > 1) out.push('…');
      out.push(n);
      prev = n;
    }
    return out;
  }

  /* ════════════════════════════════════════
     Sheet
     ════════════════════════════════════════ */
  function openSheet(s) {
    _currentRawUrl = s.rawScript || null;

    // Thumb
    const tw = document.getElementById('sheetThumbWrap');
    const imgSrc = safeUrl(s.image);
    tw.innerHTML = imgSrc
      ? `<img class="sheet-thumb" src="${x(imgSrc)}" onerror="this.outerHTML='<div class=sheet-thumb-placeholder>🎮</div>'">`
      : `<div class="sheet-thumb-placeholder">🎮</div>`;

    // Header
    document.getElementById('sheetGame').textContent  = s.game?.title || '';
    document.getElementById('sheetTitle').textContent = s.title || 'Untitled';

    const badges = document.getElementById('sheetBadges');
    badges.innerHTML = '';
    if (s.paid === false) badges.innerHTML += '<span class="badge badge-free">Free</span>';
    else                  badges.innerHTML += '<span class="badge badge-paid">Paid</span>';
    if (s.keySystem)      badges.innerHTML += '<span class="badge badge-key">Key Required</span>';
    if (s.user?.verified) badges.innerHTML += '<span class="badge badge-verified">✓ Verified Creator</span>';

    // Body
    const created = s.createdAt   ? new Date(s.createdAt).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : '—';
    const updated = s.lastUpdated ? new Date(s.lastUpdated).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : created;

    const avatarSrc = s.user?.image || '';

    document.getElementById('sheetBody').innerHTML = `
      ${s.description ? `
        <div>
          <div class="sheet-section-label">Description</div>
          <div class="sheet-desc">${x(s.description)}</div>
        </div>` : ''}

      <div>
        <div class="sheet-section-label">Details</div>
        <div class="meta-row">
          <div class="meta-cell">
            <div class="meta-cell-label">Likes</div>
            <div class="meta-cell-value" style="color:var(--green)">▲ ${fmt(s.likes)}</div>
          </div>
          <div class="meta-cell">
            <div class="meta-cell-label">Views</div>
            <div class="meta-cell-value">👁 ${fmt(s.views)}</div>
          </div>
          <div class="meta-cell">
            <div class="meta-cell-label">Created</div>
            <div class="meta-cell-value">${x(created)}</div>
          </div>
          <div class="meta-cell">
            <div class="meta-cell-label">Updated</div>
            <div class="meta-cell-value">${x(updated)}</div>
          </div>
        </div>
      </div>

      <div>
        <div class="sheet-section-label">Author</div>
        <div class="author-row">
          <img class="author-avatar" src="${x(avatarSrc)}" alt="${x(s.user?.username||'')}"
            onerror="this.style.display='none'">
          <div>
            <div class="author-name">${x(s.user?.username || 'Unknown')}</div>
            <div class="author-sub">${s.user?.verified ? 'Verified Creator' : 'Community Member'}</div>
          </div>
        </div>
      </div>`;

    // Execute button state
    const btnExecute = document.getElementById('btnExecute');
    const btnCopy    = document.getElementById('btnCopy');
    document.getElementById('btnExecuteLabel').textContent = 'Execute';
    document.getElementById('btnSpinner').style.display = 'none';
    btnExecute.disabled = !_currentRawUrl;
    btnCopy.disabled    = !_currentRawUrl;

    // Reset copy button appearance
    btnCopy.classList.remove('copied');
    btnCopy.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;

    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeSheet() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  /* ════════════════════════════════════════
     Button Handlers
     ════════════════════════════════════════ */
  document.getElementById('btnExecute').addEventListener('click', () => {
    if (!_currentRawUrl) return;
    const btn    = document.getElementById('btnExecute');
    const label  = document.getElementById('btnExecuteLabel');
    const spinner= document.getElementById('btnSpinner');
    btn.disabled = true;
    label.textContent = 'Executing…';
    spinner.style.display = 'block';
    _triggerExecute(_currentRawUrl);
  });

  document.getElementById('btnCopy').addEventListener('click', () => {
    if (!_currentRawUrl) return;
    _triggerCopy(_currentRawUrl);
  });

  /* ════════════════════════════════════════
     Filter Panel
     ════════════════════════════════════════ */
  const filterToggle = document.getElementById('filterToggle');
  const filterPanel  = document.getElementById('filterPanel');

  filterToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    const open = filterPanel.classList.toggle('open');
    filterToggle.classList.toggle('active', open);
  });

  document.addEventListener('click', (e) => {
    if (!filterPanel.contains(e.target) && e.target !== filterToggle) {
      filterPanel.classList.remove('open');
      filterToggle.classList.remove('active');
    }
  });

  // Toggles
  document.querySelectorAll('.toggle').forEach(toggle => {
    toggle.addEventListener('click', () => {
      const key = toggle.dataset.key;
      state.filters[key] = !state.filters[key];
      toggle.classList.toggle('on', state.filters[key]);
      updateFilterDot();
      state.page = 1;
      fetchScripts();
    });
  });

  document.getElementById('filterClear').addEventListener('click', () => {
    Object.keys(state.filters).forEach(k => state.filters[k] = false);
    document.querySelectorAll('.toggle').forEach(t => t.classList.remove('on'));
    document.getElementById('orderBy').value  = 'date';
    document.getElementById('sortDir').value  = 'desc';
    state.orderBy = 'date';
    state.sort    = 'desc';
    updateFilterDot();
    state.page = 1;
    fetchScripts();
  });

  function updateFilterDot() {
    const anyActive = Object.values(state.filters).some(Boolean)
      || state.orderBy !== 'date' || state.sort !== 'desc';
    document.getElementById('filterDot').classList.toggle('visible', anyActive);
  }

  document.getElementById('orderBy').addEventListener('change', e => {
    state.orderBy = e.target.value; state.page = 1; updateFilterDot(); fetchScripts();
  });
  document.getElementById('sortDir').addEventListener('change', e => {
    state.sort = e.target.value; state.page = 1; updateFilterDot(); fetchScripts();
  });

  /* ════════════════════════════════════════
     Search
     ════════════════════════════════════════ */
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(state.debounce);
    state.debounce = setTimeout(() => {
      state.q    = e.target.value.trim();
      state.page = 1;
      fetchScripts();
    }, 400);
  });

  /* ════════════════════════════════════════
     Modal dismiss
     ════════════════════════════════════════ */
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeSheet();
  });

  /* ════════════════════════════════════════
     Helpers
     ════════════════════════════════════════ */
  function x(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmt(n) {
    const v = parseInt(n) || 0;
    if (v >= 1e6) return (v/1e6).toFixed(1).replace(/\.0$/,'')+'M';
    if (v >= 1e3) return (v/1e3).toFixed(1).replace(/\.0$/,'')+'k';
    return v;
  }

  function safeUrl(u) {
    return u && typeof u === 'string' && u.startsWith('http') ? u : '';
  }

  function timeAgo(d) {
    const m = Math.floor((Date.now()-d)/60000);
    if (m < 1)   return 'now';
    if (m < 60)  return `${m}m`;
    const h = Math.floor(m/60);
    if (h < 24)  return `${h}h`;
    const dy = Math.floor(h/24);
    if (dy < 30) return `${dy}d`;
    const mo = Math.floor(dy/30);
    if (mo < 12) return `${mo}mo`;
    return `${Math.floor(mo/12)}y`;
  }

  /* ════════════════════════════════════════
     Init
     ════════════════════════════════════════ */
  fetchScripts();
</script>
</body>
</html>
